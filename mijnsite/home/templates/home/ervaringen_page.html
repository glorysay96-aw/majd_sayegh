{% extends "base.html" %}
{% load static wagtailcore_tags wagtailembeds_tags %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/welcome_page.css' %}">
{% endblock extra_css %}

{% block content %}

<div class="hero">

    <h1>{{ page.title }}</h1>

    <div class="intro">
        {{ page.tekst|richtext }}
    </div>

    {% if page.video %}
        <div class="video-wrapper">
            {% embed page.video %}
        </div>
    {% endif %}

</div>

{% endblock content %}
